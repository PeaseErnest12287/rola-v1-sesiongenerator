<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ernest v2 Bot</title>
  <link rel="icon" type="image/x-icon" href="./rola.jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-image: url("./rola.jpg");
      background-size: cover;
      background-position: center;
      font-family: 'Orbitron', sans-serif;
      color: #0ff;
    }

    .container {
      text-align: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 10px;
      box-shadow: 0 0 15px cyan, 0 0 30px blue;
    }

    h3 {
      font-size: 2em;
      text-shadow: 0 0 15px cyan;
    }

    .input-container {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .input-container input {
      padding: 10px;
      border: 2px solid cyan;
      border-radius: 5px;
      background: #111;
      color: #0ff;
    }

    .input-container button {
      padding: 10px;
      background: cyan;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .whatsapp-btn, .session-btn {
      display: block;
      width: 100%;
      padding: 10px;
      background-color: #25D366;
      color: white;
      text-align: center;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 10px;
      transition: background 0.2s;
    }

    .whatsapp-btn:hover, .session-btn:hover {
      background-color: #128C7E;
    }

    @media (max-width: 500px) {
      .input-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Ernest V2 - Created by Pease Ernest</h3>
    <p>Enter your number with country code</p>
    <div class="input-container">
      <input placeholder="+23490665xxx" type="number" id="number">
      <button id="submit">Enter</button>
    </div>
    <p id="pair"></p>
    <button class="session-btn" onclick="window.location.href='pair.html'">Get Session</button>
    <p>Join our community for updates:</p>
    <a href="https://whatsapp.com/channel/0029VayK4ty7DAWr0jeCZx0i" class="whatsapp-btn">Join Channel</a>
    <a href="https://chat.whatsapp.com/FAJjIZY3a09Ck73ydqMs4E" class="whatsapp-btn">Join Group</a>
  </div>

  <script>
    document.getElementById("submit").addEventListener("click", async () => {
      let number = document.getElementById("number").value.trim();
      if (!number) {
        document.getElementById("pair").innerHTML = "Please enter a valid number.";
        return;
      }
      document.getElementById("pair").innerHTML = "Processing...";
      let response = await fetch(`/code?number=${number}`);
      let data = await response.json();
      document.getElementById("pair").innerHTML = `CODE: ${data.code || "Service Unavailable"}`;
    });
  </script>
</body>
</html>
